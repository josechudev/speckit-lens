schema_version: "1.0"

extension:
  id: "lens-humanize"
  name: "Lens Humanize"
  version: "0.1.0"
  description: "Translates the agent-oriented plan.md into PR-sized chunks with ownership signals, visible dependencies, and entry/exit criteria."
  author: "josechudev"
  repository: "https://github.com/josechudev/speckit-lens"
  license: "MIT"

requires:
  speckit_version: ">=0.9.1"

provides:
  commands:
    - name: "speckit.lens.humanize"
      file: "commands/humanize.md"
      description: "Produce a human-reviewable plan document from plan.md before implementation begins."

hooks:
  after_plan:
    command: "speckit.lens.humanize"
    optional: true
    prompt: "Run lens-humanize to translate plan.md for human review?"
    description: "Converts the agent-oriented plan into PR-sized chunks with ownership and dependency visibility."

tags:
  - "plan"
  - "readability"
  - "human-review"
  - "pr"
